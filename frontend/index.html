<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hangman Frontend</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar"></header>

  <main class="app">
    <section class="hud">
      <div class="hud-left">
        <h2 id="categoryLabel">Everyday Objects</h2>
      </div>
      <div class="hud-right">
        <div>Saved: <span id="savedCount">0</span></div>
        <div>Best: <span id="bestCount">0</span></div>
      </div>
    </section>

    <section class="profile-row">
      <label for="profileSelect">Profile</label>
      <select id="profileSelect" aria-label="Choose player profile"></select>
      <button id="addProfileBtn" aria-label="Create profile">+ Profile</button>
      <button id="renameProfileBtn" aria-label="Rename profile">Rename</button>
      <button id="deleteProfileBtn" aria-label="Delete profile">Delete</button>
      <label for="avatarColorInput" class="avatar-color-label">Avatar</label>
      <input id="avatarColorInput" type="color" value="#2c3e50" aria-label="Profile avatar color" />
      <span id="activeProfileBadge" class="profile-badge">Active: Player</span>
      <button id="importPackBtn" aria-label="Import custom word pack">Import Pack</button>
      <button id="exportPackBtn" aria-label="Export custom word pack">Export Pack</button>
      <button id="settingsBtn" aria-label="Open settings">Settings</button>
      <input id="importPackInput" type="file" accept="application/json" hidden />
    </section>

    <section class="quick-stats" aria-label="Quick performance stats">
      <div class="stat-chip"><span class="chip-label">Win Rate</span><span id="winRateValue" class="chip-value">0%</span></div>
      <div class="stat-chip"><span class="chip-label">Avg Misses</span><span id="avgMissesValue" class="chip-value">0.0</span></div>
      <div class="stat-chip"><span class="chip-label">Best Timer Streak</span><span id="bestTimerStreakValue" class="chip-value">0</span></div>
    </section>

    <section class="board">
      <div class="left-col">
        <h1 id="wordMask">_ _ _ _ _</h1>
        <p id="hintText">Hint: ...</p>
        <p id="statusText">Pick a letter to start.</p>

        <div class="meta-row">
          <span id="missesText">Misses: 0/6</span>
          <span id="timerText">Timer: Off</span>
        </div>

        <div class="progress-wrap" aria-hidden="true">
          <div class="progress-label">Rescue Progress</div>
          <div class="progress-track">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>

        <div id="keyboard" class="keyboard"></div>

        <div class="controls">
          <button id="newBtn" aria-label="Start a new game">New Game</button>
          <button id="hintBtn" aria-label="Use hint">Hint (2)</button>
          <label class="timer-toggle">
            <input id="timerToggle" type="checkbox" aria-label="Enable timer" />
            Timer
          </label>
        </div>
      </div>

      <div class="right-col">
        <canvas id="scene" width="360" height="450" aria-label="Hangman drawing"></canvas>
      </div>
    </section>
  </main>

  <aside id="settingsDrawer" class="settings-drawer" aria-label="Game settings" aria-hidden="true">
    <div class="settings-header">
      <h3>Settings</h3>
      <button id="closeSettingsBtn" aria-label="Close settings">X</button>
    </div>
    <div class="settings-body">
      <label for="timerSecondsInput">Timer Seconds</label>
      <input id="timerSecondsInput" type="number" min="5" max="60" value="15" />

      <label for="hintsPerRoundInput">Hints Per Round</label>
      <input id="hintsPerRoundInput" type="number" min="0" max="5" value="2" />

      <label class="setting-toggle"><input id="soundToggle" type="checkbox" checked /> Sound</label>
      <label class="setting-toggle"><input id="reducedMotionToggle" type="checkbox" /> Reduced Motion</label>
      <label class="setting-toggle"><input id="contrastToggle" type="checkbox" /> Contrast Safe Mode</label>

      <button id="saveSettingsBtn" class="save-settings-btn">Save Settings</button>
    </div>
  </aside>

  <div id="drawerBackdrop" class="drawer-backdrop" hidden></div>

  <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <script src="script.js"></script>
</body>
</html>
