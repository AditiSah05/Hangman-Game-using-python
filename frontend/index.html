<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hangman Frontend</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar"></header>

  <main class="app">
    <section class="hud">
      <div class="hud-left">
        <h2 id="categoryLabel">Everyday Objects</h2>
      </div>
      <div class="hud-right">
        <div>Saved: <span id="savedCount">0</span></div>
        <div>Best: <span id="bestCount">0</span></div>
      </div>
    </section>

    <section class="profile-row">
      <label for="profileSelect">Profile</label>
      <select id="profileSelect"></select>
      <button id="addProfileBtn">+ Profile</button>
      <span id="activeProfileBadge" class="profile-badge">Active: Player</span>
      <button id="importPackBtn">Import Pack</button>
      <button id="exportPackBtn">Export Pack</button>
      <input id="importPackInput" type="file" accept="application/json" hidden />
    </section>

    <section class="board">
      <div class="left-col">
        <h1 id="wordMask">_ _ _ _ _</h1>
        <p id="hintText">Hint: ...</p>
        <p id="statusText">Pick a letter to start.</p>

        <div class="meta-row">
          <span id="missesText">Misses: 0/6</span>
          <span id="timerText">Timer: Off</span>
        </div>

        <div class="progress-wrap" aria-hidden="true">
          <div class="progress-label">Rescue Progress</div>
          <div class="progress-track">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>

        <div id="keyboard" class="keyboard"></div>

        <div class="controls">
          <button id="newBtn">New Game</button>
          <button id="hintBtn">Hint (2)</button>
          <label class="timer-toggle">
            <input id="timerToggle" type="checkbox" />
            Timer
          </label>
        </div>
      </div>

      <div class="right-col">
        <canvas id="scene" width="360" height="450" aria-label="Hangman drawing"></canvas>
      </div>
    </section>
  </main>

  <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <script src="script.js"></script>
</body>
</html>
